esphome:
  name: omnibreeze-fan
  friendly_name: OmniBreeze Fan

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:

api:
  encryption:
    key: XXXXXXXXXXXXXX

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: omnibreeze-fan Fallback Hotspot
    password: XXXXXXXXXXXXXX

remote_transmitter:
  pin: GPIO4
  carrier_duty_percent: 50%

i2c:
  sda: GPIO21
  scl: GPIO18

globals:
  - id: oscillation_state
    type: bool
    restore_value: no
    initial_value: 'false'

font:
  - file: "gfonts://Roboto Mono"
    id: font_main
    size: 9

image:
  - file: "sh_logo.png"
    id: fan_logo
    type: BINARY
    invert_alpha: true

interval:
  - interval: 1s
    then:
      - lambda: |-
          // Sync breeze select
          std::string breeze = "standard";
          if (id(led_breeze2).state) breeze = "natural";
          id(breeze_mode).publish_state(breeze);

          // Sync timer select
          int hours = (id(led_timer1).state ? 1 : 0)
                    + (id(led_timer2).state ? 2 : 0)
                    + (id(led_timer3).state ? 4 : 0)
                    + (id(led_timer4).state ? 8 : 0);
          std::string timer = "off";
          if (hours == 1)  timer = "1h";
          if (hours == 2)  timer = "2h";
          if (hours == 3)  timer = "3h";
          if (hours == 4)  timer = "4h";
          if (hours == 5)  timer = "5h";
          if (hours == 6)  timer = "6h";
          if (hours == 7)  timer = "7h";
          if (hours == 8)  timer = "8h";
          if (hours == 9)  timer = "9h";
          if (hours == 10) timer = "10h";
          if (hours == 11) timer = "11h";
          if (hours == 12) timer = "12h";
          if (hours == 13) timer = "13h";
          if (hours == 14) timer = "14h";
          if (hours == 15) timer = "15h";
          id(fan_timer_select).publish_state(timer);
    
sensor:
  - platform: adc
    pin: GPIO1
    id: ldr_speed1
    name: "LDR Speed 1 Raw"
    update_interval: 100ms
    attenuation: 12db
