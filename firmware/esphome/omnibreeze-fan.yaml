binary_sensor:
  - platform: analog_threshold
    sensor_id: ldr_speed1
    id: led_speed1
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_speed2
    id: led_speed2
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_speed3
    id: led_speed3
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_speed4
    id: led_speed4
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_breeze1
    id: led_breeze1
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_breeze2
    id: led_breeze2
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_breeze3
    id: led_breeze3
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_timer1
    id: led_timer1
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_timer2
    id: led_timer2
    threshold: 0.15
    internal: true

  - platform: analog_threshold
    sensor_id: ldr_timer3
    id: led_timer3
    threshold: 0.15
